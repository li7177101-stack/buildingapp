name: Build iOS App (Device)
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          brew install autoconf automake libtool pkg-config
          pip install --upgrade pip
          pip install cython kivy-ios plyer

      - name: Build Python for iOS
        run: |
          python -m kivy_ios.toolchain build python

      - name: Build Kivy and dependencies
        run: |
          python -m kivy_ios.toolchain build kivy
          python -m kivy_ios.toolchain build pillow
          python -m kivy_ios.toolchain build plyer

      - name: Create Xcode project
        run: |
          python -m kivy_ios.toolchain create BuildingApp ./main.py

      - name: Remove problematic Run Script
        run: |
          cd buildingapp-ios
          cp buildingapp.xcodeproj/project.pbxproj buildingapp.xcodeproj/project.pbxproj.bak
          sed -i '' '/rsync.*main.py/d' buildingapp.xcodeproj/project.pbxproj
          sed -i '' '/Script-113D17E2153E3DB5001310A5/d' buildingapp.xcodeproj/project.pbxproj

      - name: Set bundle identifier
        run: |
          cd buildingapp-ios
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier org.buildingapp.buildingapp" buildingapp-Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" buildingapp-Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" buildingapp-Info.plist

      - name: Install kivymd
        run: |
          cd buildingapp-ios
          ../dist/hostpython3/bin/python3 -m pip install kivymd==1.1.1

      - name: Add permissions
        run: |
          cd buildingapp-ios
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 需要相机权限来拍摄图片进行图生图转换" buildingapp-Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 需要访问相册来选择图片进行图生图/文生图" buildingapp-Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 需要保存生成的图片到相册" buildingapp-Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" buildingapp-Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" buildingapp-Info.plist || true

      - name: Build for Device
        run: |
          cd buildingapp-ios
          xcodebuild -project buildingapp.xcodeproj \
            -scheme buildingapp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ARCHS="arm64"

      - name: Copy source folders to app bundle
        run: |
          cd buildingapp-ios
          APP_PATH="build/Build/Products/Release-iphoneos/buildingapp.app"
          if [ -d "$APP_PATH" ]; then
            cp -r ../building_app "$APP_PATH/" 2>/dev/null || echo "building_app not found"
            cp -r ../images "$APP_PATH/" 2>/dev/null || echo "images not found"
            cp ../building.kv "$APP_PATH/" 2>/dev/null || echo "building.kv not found"
            cp ../main.py "$APP_PATH/"
            echo "✅ Source folders copied"
            ls -la "$APP_PATH/"
          else
            echo "❌ App not found"
            exit 1
          fi

      - name: Create IPA
        run: |
          cd buildingapp-ios
          APP_PATH="build/Build/Products/Release-iphoneos/buildingapp.app"
          if [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r buildingapp.ipa Payload
            echo "✅ IPA created successfully"
          else
            echo "❌ App not found"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: buildingapp-ipa
          path: buildingapp-ios/buildingapp.ipa
