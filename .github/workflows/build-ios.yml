name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          brew install autoconf automake libtool pkg-config
          pip install --upgrade pip
          pip install cython kivy-ios plyer

      - name: Build Python for iOS
        run: |
          python -m kivy_ios.toolchain build python

      - name: Build Kivy and dependencies
        run: |
          python -m kivy_ios.toolchain build kivy
          python -m kivy_ios.toolchain build pillow
          python -m kivy_ios.toolchain build plyer

      - name: Create Xcode project
        run: |
          python -m kivy_ios.toolchain create BuildingApp ./main.py

      - name: Debug - List buildingapp-ios directory
        run: |
          echo "=== buildingapp-ios directory contents ==="
          ls -la buildingapp-ios/
          echo "=== Find all plist files ==="
          find buildingapp-ios -name "*.plist" -type f
          echo "=== Find all Info.plist files ==="
          find buildingapp-ios -name "Info.plist" -type f

      - name: Set bundle identifier and version
        run: |
          cd buildingapp-ios
          INFO_PLIST=$(find . -name "Info.plist" -type f | head -1)
          echo "Found Info.plist at: $INFO_PLIST"
          if [ -n "$INFO_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier org.buildingapp.buildingapp" "$INFO_PLIST"
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" "$INFO_PLIST"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" "$INFO_PLIST"
            echo "✅ Bundle identifier set successfully"
          else
            echo "❌ Info.plist not found!"
            echo "Creating Info.plist manually..."
            mkdir -p BuildingApp
            cat > BuildingApp/Info.plist << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleIdentifier</key>
    <string>org.buildingapp.buildingapp</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0.0</string>
    <key>CFBundleVersion</key>
    <string>1</string>
    <key>CFBundleName</key>
    <string>BuildingApp</string>
    <key>CFBundleDisplayName</key>
    <string>建筑意向图</string>
    <key>CFBundleExecutable</key>
    <string>BuildingApp</string>
    <key>CFBundlePackageType</key>
    <string>APPL</string>
</dict>
</plist>
PLIST
            echo "✅ Created Info.plist manually"
          fi

      - name: Install kivymd via pip
        run: |
          cd buildingapp-ios
          ../dist/root/python3/bin/python3 -m pip install kivymd==1.1.1

      - name: Add permissions to Info.plist
        run: |
          cd buildingapp-ios
          INFO_PLIST=$(find . -name "Info.plist" -type f | head -1)
          if [ -n "$INFO_PLIST" ]; then
            cat >> "$INFO_PLIST" << 'PERMISSIONS'
          <key>NSCameraUsageDescription</key>
          <string>需要相机权限来拍摄图片进行图生图转换</string>
          <key>NSPhotoLibraryUsageDescription</key>
          <string>需要访问相册来选择图片进行图生图/文生图</string>
          <key>NSPhotoLibraryAddUsageDescription</key>
          <string>需要保存生成的图片到相册</string>
          <key>NSAppTransportSecurity</key>
          <dict>
              <key>NSAllowsArbitraryLoads</key>
              <true/>
          </dict>
PERMISSIONS
            echo "✅ Permissions added successfully"
          fi

      - name: Build for Simulator
        run: |
          cd buildingapp-ios
          xcodebuild -workspace BuildingApp.xcworkspace \
            -scheme BuildingApp \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package Simulator App
        run: |
          cd buildingapp-ios/build/Build/Products/Release-iphonesimulator
          if [ -d "BuildingApp.app" ]; then
            zip -r BuildingApp.app.zip BuildingApp.app
            mv BuildingApp.app.zip ../../../../
            echo "✅ App packaged successfully"
          else
            echo "❌ Error: BuildingApp.app not found"
            ls -la
            exit 1
          fi

      - name: Upload Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: BuildingApp-simulator
          path: BuildingApp.app.zip
