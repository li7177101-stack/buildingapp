name: Build iOS App
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          brew install autoconf automake libtool pkg-config
          pip install --upgrade pip
          pip install cython kivy-ios plyer

      - name: Build Python for iOS
        run: |
          python -m kivy_ios.toolchain build python

      - name: Build Kivy and dependencies
        run: |
          python -m kivy_ios.toolchain build kivy
          python -m kivy_ios.toolchain build pillow
          python -m kivy_ios.toolchain build plyer

      - name: Create Xcode project
        run: |
          python -m kivy_ios.toolchain create BuildingApp ./main.py

      - name: Set bundle identifier and version
        run: |
          cd buildingapp-ios
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier org.buildingapp.buildingapp" buildingapp-Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.0" buildingapp-Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion 1" buildingapp-Info.plist
          echo "✅ Bundle identifier set successfully"

      - name: Install kivymd via pip
        run: |
          cd buildingapp-ios
          ../dist/hostpython3/bin/python3 -m pip install kivymd==1.1.1
          echo "✅ kivymd installed successfully"

      - name: Add permissions to Info.plist
        run: |
          cd buildingapp-ios
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 需要相机权限来拍摄图片进行图生图转换" buildingapp-Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string 需要访问相册来选择图片进行图生图/文生图" buildingapp-Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string 需要保存生成的图片到相册" buildingapp-Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity dict" buildingapp-Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" buildingapp-Info.plist || true
          echo "✅ Permissions added successfully"

      - name: Debug - List buildingapp-ios directory
        run: |
          echo "=== buildingapp-ios directory contents ==="
          ls -la buildingapp-ios/
          echo "=== Find .xcodeproj and .xcworkspace ==="
          find buildingapp-ios -name "*.xcodeproj" -type d
          find buildingapp-ios -name "*.xcworkspace" -type d

      - name: Build for Simulator
        run: |
          cd buildingapp-ios
          # 查找 workspace 或 xcodeproj
          if [ -f "buildingapp.xcworkspace" ]; then
            xcodebuild -workspace buildingapp.xcworkspace \
              -scheme buildingapp \
              -configuration Release \
              -sdk iphonesimulator \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          elif [ -f "BuildingApp.xcworkspace" ]; then
            xcodebuild -workspace BuildingApp.xcworkspace \
              -scheme BuildingApp \
              -configuration Release \
              -sdk iphonesimulator \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          elif [ -f "buildingapp.xcodeproj" ]; then
            xcodebuild -project buildingapp.xcodeproj \
              -scheme buildingapp \
              -configuration Release \
              -sdk iphonesimulator \
              -derivedDataPath build \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "❌ No Xcode project or workspace found"
            ls -la
            exit 1
          fi

      - name: Package Simulator App
        run: |
          cd buildingapp-ios/build/Build/Products/Release-iphonesimulator
          if [ -d "buildingapp.app" ]; then
            zip -r BuildingApp.app.zip buildingapp.app
            mv BuildingApp.app.zip ../../../../
            echo "✅ App packaged successfully"
          elif [ -d "BuildingApp.app" ]; then
            zip -r BuildingApp.app.zip BuildingApp.app
            mv BuildingApp.app.zip ../../../../
            echo "✅ App packaged successfully"
          else
            echo "❌ Error: .app not found"
            ls -la
            exit 1
          fi

      - name: Upload Simulator App
        uses: actions/upload-artifact@v4
        with:
          name: BuildingApp-simulator
          path: BuildingApp.app.zip
