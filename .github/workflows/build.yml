name: Build APK with Python 3.11

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf automake autoconf-archive libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Add custom hostpython3 URL to buildozer.spec
        run: |
          echo "" >> buildozer.spec
          echo "# 强制使用 Python 3.11.6 作为 hostpython3" >> buildozer.spec
          echo "p4a.hostpython3_url = https://github.com/python/cpython/archive/refs/tags/v3.11.6.tar.gz" >> buildozer.spec
          echo "p4a.hostpython3_version = 3.11.6" >> buildozer.spec
          echo "requirements = python3==3.11.6,kivy==2.1.0" >> buildozer.spec

      - name: Clean old p4a cache
        run: |
          rm -rf .buildozer/android/platform/python-for-android
          rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buildingapp-apk
          path: bin/*.apk
