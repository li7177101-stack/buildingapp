name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf automake autoconf-archive libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Clone and patch p4a
        run: |
          # 创建目录并克隆 p4a
          mkdir -p .buildozer/android/platform
          cd .buildozer/android/platform
          git clone --branch develop --single-branch https://github.com/kivy/python-for-android.git
          cd python-for-android
          
          # 禁用 Kivy 补丁
          sed -i '/patches = \[/,/\]/c\    patches = []' pythonforandroid/recipes/kivy/__init__.py
          
          # 设置 OpenGL ES 路径
          sed -i '/def get_recipe_env/,/return env/a\        env["KIVY_GL_BACKEND"] = "sdl2"\n        env["USE_OPENGL_ES2"] = "1"' pythonforandroid/recipes/kivy/__init__.py
          
          echo "Patches applied"

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buildingapp-apk
          path: bin/*.apk
