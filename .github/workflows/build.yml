name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf automake autoconf-archive libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Clone python-for-android and disable Kivy patches
        run: |
          # 创建目录并克隆 p4a
          mkdir -p .buildozer/android/platform
          cd .buildozer/android/platform
          git clone --branch develop --single-branch https://github.com/kivy/python-for-android.git
          cd python-for-android
          
          # 修改 Kivy 配方，清空补丁列表
          sed -i '/patches = \[/,/\]/c\    patches = []' pythonforandroid/recipes/kivy/__init__.py
          
          # 修改 hostpython3 版本（可选，确保版本一致）
          sed -i 's/version = "3.14.2"/version = "3.11.6"/g' pythonforandroid/recipes/hostpython3/__init__.py
          
          echo "Patches applied"

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buildingapp-apk
          path: bin/*.apk
