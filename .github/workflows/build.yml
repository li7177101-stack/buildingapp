name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf automake autoconf-archive libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: First run to download p4a
        run: |
          # 第一次运行，让它下载 python-for-android
          buildozer android debug || true
          sleep 5

      - name: Patch p4a to use Python 3.11
        run: |
          # 修改 hostpython3 版本
          sed -i 's/version = "3.14.2"/version = "3.11.6"/g' .buildozer/android/platform/python-for-android/pythonforandroid/recipes/hostpython3/__init__.py
          # 修改 python3 配方中的版本检查
          sed -i 's/if _p_version.minor >= 14/if _p_version.minor >= 14 and False/g' .buildozer/android/platform/python-for-android/pythonforandroid/recipes/python3/__init__.py || true
          # 禁用 Kivy 补丁
          sed -i '/patches = \[/,/\]/c\    patches = []' .buildozer/android/platform/python-for-android/pythonforandroid/recipes/kivy/__init__.py || true
          # 跳过 libjxl
          mkdir -p .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/bootstrap_builds/sdl2/jni/SDL2_image/external/
          touch .buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/bootstrap_builds/sdl2/jni/SDL2_image/external/libjxl
          echo "Patches applied"

      - name: Clean old build
        run: |
          rm -rf .buildozer/android/platform/build-arm64-v8a_armeabi-v7a

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buildingapp-apk
          path: bin/*.apk
