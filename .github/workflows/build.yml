name: Build APK with Python 3.11

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf automake autoconf-archive libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Patch p4a to use Python 3.11
        run: |
          # 找到 p4a 的安装位置
          P4A_PATH=$(python -c "import pythonforandroid; print(pythonforandroid.__path__[0])")
          echo "P4A path: $P4A_PATH"
          # 修改 hostpython3 配方
          sed -i 's/version = "3.14.2"/version = "3.11.6"/g' $P4A_PATH/recipes/hostpython3/__init__.py
          sed -i 's/url = "https:\/\/github.com\/python\/cpython\/archive\/refs\/tags\/v{version}.tar.gz"/url = "https:\/\/github.com\/python\/cpython\/archive\/refs\/tags\/v3.11.6.tar.gz"/g' $P4A_PATH/recipes/hostpython3/__init__.py
          # 同时修改 python3 配方中的版本检查（如果有）
          sed -i 's/if _p_version.minor >= 14/if _p_version.minor >= 14 and False/g' $P4A_PATH/recipes/python3/__init__.py || true
          # 显示修改结果
          cat $P4A_PATH/recipes/hostpython3/__init__.py | grep version

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buildingapp-apk
          path: bin/*.apk
