name: Build APK with Python 3.11

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf automake autoconf-archive libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: First run to download p4a
        run: |
          # 运行一次 buildozer，让它下载 python-for-android
          buildozer android debug || true
          # 等待 p4a 下载完成
          sleep 5

      - name: Patch p4a to use Python 3.11
        run: |
          # 查找 p4a 安装位置（在 .buildozer 目录中）
          P4A_PATH="./.buildozer/android/platform/python-for-android/pythonforandroid"
          if [ -d "$P4A_PATH" ]; then
            echo "Found p4a at $P4A_PATH"
            # 修改 hostpython3 配方
            sed -i 's/version = "3.14.2"/version = "3.11.6"/g' $P4A_PATH/recipes/hostpython3/__init__.py
            sed -i 's/url = "https:\/\/github.com\/python\/cpython\/archive\/refs\/tags\/v{version}.tar.gz"/url = "https:\/\/github.com\/python\/cpython\/archive\/refs\/tags\/v3.11.6.tar.gz"/g' $P4A_PATH/recipes/hostpython3/__init__.py
            echo "Patched hostpython3 recipe"
          else
            echo "p4a not found at $P4A_PATH"
            exit 1
          fi

      - name: Build APK
        run: buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: buildingapp-apk
          path: bin/*.apk
