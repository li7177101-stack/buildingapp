name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: buildozer-cache-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-cache-${{ runner.os }}-
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf automake autoconf-archive libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip install buildozer cython
      
      - name: Download Python 3.11 for hostpython3
        run: |
          mkdir -p ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/packages/hostpython3
          cd ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/packages/hostpython3
          wget https://github.com/python/cpython/archive/refs/tags/v3.11.6.tar.gz
          mv v3.11.6.tar.gz v3.14.2.tar.gz
          touch .mark-v3.14.2.tar.gz
          ls -lh
      
      - name: Clean old cache
        run: |
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/other_builds/hostpython3
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/other_builds/python3
      
      - name: Build APK
        run: buildozer android debug -v
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: buildingapp-apk
          path: bin/*.apk
