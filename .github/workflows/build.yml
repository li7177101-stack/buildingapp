name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Cache Android SDK
        uses: actions/cache@v3
        with:
          path: ~/.buildozer
          key: buildozer-cache-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-cache-${{ runner.os }}-
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf automake autoconf-archive libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip install buildozer cython
      
      - name: Clean old hostpython3 cache
        run: |
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/other_builds/hostpython3
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a_armeabi-v7a/build/other_builds/python3
      
      - name: Build APK with verbose logging
        run: |
          set -x
          buildozer android debug -v 2>&1 | tee build.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo ""
            echo "========================================"
            echo "❌ BUILD FAILED with exit code: $exit_code"
            echo "========================================"
            echo ""
            echo "--- Last 200 lines of build.log ---"
            tail -200 build.log
            echo "--- End of log ---"
            echo ""
            echo "Searching for common error patterns..."
            grep -i -E "error|fatal|traceback|failed" build.log | tail -50
          fi
          exit $exit_code
      
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: buildingapp-apk
          path: bin/*.apk
